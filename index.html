<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Gift</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    :root { --bg: 221 39% 11%; --card: 0 0% 100%; --text: 210 40% 98%; --accent: 217 91% 60%; }
    * { font-family: Inter, system-ui, sans-serif; }
    body { margin: 0; background: hsl(var(--bg)); color: hsl(var(--text)); }
    .glass { background: hsl(var(--card) / 0.1); backdrop-filter: blur(16px); border: 1px solid hsl(var(--card) / 0.12); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .pointer-glow { box-shadow: 0 0 22px hsl(var(--accent) / 0.95), 0 0 56px hsl(var(--accent) / 0.45); }
    .btn-glow { box-shadow: 0 0 28px hsl(var(--accent) / 0.55); }
    .win-glow { box-shadow: 0 0 0 1px hsl(var(--accent) / 0.25), 0 0 40px hsl(var(--accent) / 0.35); }
    .bounce-gift { animation: bounceGift 1s ease-in-out infinite; }
    @keyframes bounceGift { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-10px) scale(1.04); } }
  </style>
</head>
<body>
  <div id="app" class="mx-auto min-h-screen w-full max-w-md pb-24"></div>

  <script>
    // Configuration
    const API_URL = "http://localhost:3000/api"; // Change this in production
    const tg = window.Telegram?.WebApp;
    
    // Tiers and Pools remain identical for the UI
    const tiers = [
      { id: "all25", label: "All 25 ✨", cost: 25, preview: ["🌹", "🎁", "💝", "🧸", "🎂"] },
      { id: "all50", label: "All 50 ✨", cost: 50, preview: ["🌹", "🍾", "🌹", "🧸", "💎"] }
    ];
    const pool25 = [ { id: "cup100", emoji: "🏆", probability: 0.806, reward: 100, sell: 70 }, { id: "gift25", emoji: "🎁", probability: 25, reward: 25, sell: 18 } ];
    const pool50 = [ { id: "cup100", emoji: "🏆", probability: 5.46, reward: 100, sell: 70 }, { id: "gift25", emoji: "🎁", probability: 11.61, reward: 25, sell: 18 } ];

    const state = {
      tab: "play",
      tierId: "all25",
      demo: true,
      sparks: 0,
      gifts: [],
      spinning: false,
      userName: "Guest"
    };

    function currentTier() { return tiers.find(t => t.id === state.tierId) || tiers[0]; }
    function currentPool() { return currentTier().cost >= 50 ? pool50 : pool25; }

    // Weighted Pick (For Demo Mode ONLY)
    function demoWeightedPick(pool) {
      const total = pool.reduce((a, i) => a + i.probability, 0);
      let r = Math.random() * total;
      for (const item of pool) { r -= item.probability; if (r <= 0) return item; }
      return pool[pool.length - 1];
    }

    async function initializeUser() {
      if (tg?.initData) {
        try {
          const res = await fetch(`${API_URL}/user`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ initData: tg.initData })
          });
          const data = await res.json();
          state.userName = data.name;
          state.sparks = data.sparks;
          state.gifts = data.gifts;
          render();
        } catch (err) { console.error("Failed to fetch user data", err); }
      }
    }

    // --- Render Functions (Truncated for brevity, use your original UI templates) ---
    function render() {
      const app = document.getElementById("app");
      const tier = currentTier();
      app.innerHTML = `
        <main class="px-4 pt-4 space-y-4">
          ${state.tab === "play" ? playTab(tier, currentPool()) : ""}
          ${state.tab === "profile" ? profileTab() : ""}
        </main>
        `;
      bindEvents();
    }

    function playTab(tier, pool) {
        const priceText = state.demo ? "FREE" : `Pay ✨ ${tier.cost}`;
        return `
            <button id="spinBtn" class="btn-glow relative h-14 w-full rounded-2xl bg-blue-500 font-semibold text-white mt-4">
              I'll be lucky! <span class="absolute right-3 top-1/2 -translate-y-1/2 rounded-full bg-yellow-400 px-2.5 py-1 text-xs font-bold text-slate-900">${priceText}</span>
            </button>
        `;
    }
    
    function profileTab() {
        return `<div class="text-white text-center mt-10">👤 ${state.userName} <br/> ✨ ${state.sparks} Sparks</div>`;
    }

    function bindEvents() {
      document.getElementById("spinBtn")?.addEventListener("click", spin);
      // Re-bind your tab buttons and demo toggles here
    }

    async function spin() {
      if (state.spinning) return;
      const tier = currentTier();
      state.spinning = true;

      let winner;

      if (state.demo) {
        winner = demoWeightedPick(currentPool());
      } else {
        // Real Mode: Trigger Telegram Invoice
        try {
          const res = await fetch(`${API_URL}/invoice`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ initData: tg.initData, tierCost: tier.cost })
          });
          const data = await res.json();
          
          if (data.invoiceUrl) {
            tg.openInvoice(data.invoiceUrl, async (status) => {
              if (status === 'paid') {
                 // Payment successful, now hit the backend to actually spin!
                 const spinRes = await fetch(`${API_URL}/spin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ initData: tg.initData, tierCost: tier.cost })
                 });
                 const spinData = await spinRes.json();
                 winner = spinData.winner;
                 // Update state securely from server response
                 state.sparks = spinData.newBalance;
                 state.gifts = spinData.newInventory;
                 executeSpinAnimation(currentPool(), winner);
              } else {
                  state.spinning = false; // User cancelled
              }
            });
            return; // Exit early, animation handled in callback
          }
        } catch (err) { alert("Payment failed"); state.spinning = false; return; }
      }

      // If demo mode, just run animation
      if (state.demo) executeSpinAnimation(currentPool(), winner);
    }

    async function executeSpinAnimation(pool, winner) {
      showSpinOverlay(pool, winner);
      const track = document.getElementById("reelTrack");
      const container = track.parentElement;
      
      const step = 92; // 80px (w-20) + 12px (gap-3)
      const stopIndex = 62; 
      
      // Calculate exact center of the container
      const containerCenter = container.offsetWidth / 2;
      const targetItemCenter = (stopIndex * step) + (80 / 2); // 80 is the item width
      
      // The exact translation needed to put the target item dead center
      const finalTranslateX = containerCenter - targetItemCenter;

      track.style.transition = "none";
      track.style.transform = "translateX(0px)";
      await wait(60);

      track.style.transition = "transform 520ms cubic-bezier(0.22, 0.88, 0.38, 1)";
      track.style.transform = `translateX(${-14 * step}px)`;
      await wait(520);

      track.style.transition = "transform 2100ms linear";
      track.style.transform = `translateX(${-44 * step}px)`;
      await wait(2100);

      track.style.transition = "transform 2800ms cubic-bezier(0.08, 0.86, 0.22, 1.03)";
      track.style.transform = `translateX(${finalTranslateX}px)`;
      await wait(2800);

      hideSpinOverlay();
      showWinOverlay(winner);
      state.spinning = false;
    }

    function showSpinOverlay(pool, winner) {
      const overlay = document.createElement("div");
      overlay.id = "spinOverlay";
      overlay.className = "fixed inset-0 z-40 grid place-items-center bg-slate-950/95 px-4";
      overlay.innerHTML = `
        <div class="glass w-full max-w-sm rounded-3xl p-4">
          <div class="relative overflow-hidden rounded-2xl border border-white/10 bg-white/5 py-5 w-full">
            <div class="absolute left-1/2 top-0 z-10 h-full -translate-x-1/2 px-1"><div class="pointer-glow h-6 w-3 rounded-b-full bg-blue-500"></div></div>
            <div id="reelTrack" class="flex gap-3 px-0 w-max"></div>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);

      const reelTrack = document.getElementById("reelTrack");
      const reel = Array.from({ length: 72 }, (_, i) => pool[i % pool.length]);
      reel[62] = winner; // Ensure winner is correctly placed
      reelTrack.innerHTML = reel.map(r => `<div class="grid h-24 w-20 shrink-0 place-items-center rounded-2xl border border-white/10 bg-white/10 text-4xl">${r.emoji}</div>`).join("");
    }

    function hideSpinOverlay() { document.getElementById("spinOverlay")?.remove(); }

    function showWinOverlay(winner) {
      // Create your Win overlay here
      // For Demo mode, buttons close the window but do NOT update state.
      // For Real mode, state was already updated by the server during the payment callback.
    }

    function wait(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
    
    if (tg) {
        tg.ready(); tg.expand(); 
        initializeUser(); // Fetch real data from backend
    } else {
        render(); // Render defaults if tested outside Telegram
    }
  </script>
</body>
</html>
