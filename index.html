<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Gift</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    :root { --bg: 221 39% 11%; --card: 0 0% 100%; --text: 210 40% 98%; --accent: 217 91% 60%; }
    * { font-family: Inter, system-ui, sans-serif; }
    body { margin: 0; background: hsl(var(--bg)); color: hsl(var(--text)); }
    .glass { background: hsl(var(--card) / 0.1); backdrop-filter: blur(16px); border: 1px solid hsl(var(--card) / 0.12); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
    .pointer-glow { box-shadow: 0 0 22px hsl(var(--accent) / 0.95), 0 0 56px hsl(var(--accent) / 0.45); }
    .btn-glow { box-shadow: 0 0 28px hsl(var(--accent) / 0.55); }
    .win-glow { box-shadow: 0 0 0 1px hsl(var(--accent) / 0.25), 0 0 40px hsl(var(--accent) / 0.35); }
    .bounce-gift { animation: bounceGift 1s ease-in-out infinite; }
    @keyframes bounceGift { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-10px) scale(1.04); } }
  </style>
</head>
<body>
  <div id="app" class="mx-auto min-h-screen w-full max-w-md pb-24"></div>

  <script>
    const API_URL = "http://localhost:3000/api"; // Your backend URL
    
    const tiers = [
      { id: "all25", label: "All 25 ✨", cost: 25, preview: ["🌹", "🎁", "💝", "🧸", "🎂"] },
      { id: "bear33", label: "Bear cubs 33 ✨", cost: 33, preview: ["🧸", "🧸", "🧸", "🎁", "💝"] },
      { id: "romance42", label: "Romance 42 ✨", cost: 42, preview: ["🌹", "💝", "🌹", "🍾", "💎"] },
      { id: "all50", label: "All 50 ✨", cost: 50, preview: ["🌹", "🍾", "🌹", "🧸", "💎"] },
    ];

    const pool25 = [
      { id: "cup100", emoji: "🏆", probability: 0.806, reward: 100, sell: 70 },
      { id: "rose25", emoji: "🌹", probability: 25, reward: 25, sell: 18 },
      { id: "cake50", emoji: "🎂", probability: 0.484, reward: 50, sell: 35 },
      { id: "heart15", emoji: "💝", probability: 21.37, reward: 15, sell: 10 },
      { id: "teddy15", emoji: "🧸", probability: 21.37, reward: 15, sell: 10 },
      { id: "gift25", emoji: "🎁", probability: 25, reward: 25, sell: 18 },
    ];
    const pool50 = [
      { id: "cup100", emoji: "🏆", probability: 5.46, reward: 100, sell: 70 },
      { id: "rose25", emoji: "🌹", probability: 11.61, reward: 25, sell: 18 },
      { id: "cake50", emoji: "🎂", probability: 4.65, reward: 50, sell: 35 },
      { id: "heart15", emoji: "💝", probability: 6.97, reward: 15, sell: 10 },
      { id: "teddy15", emoji: "🧸", probability: 6.97, reward: 15, sell: 10 },
      { id: "gift25", emoji: "🎁", probability: 11.61, reward: 25, sell: 18 },
    ];

    const leaderboard = [
      ["🦊", "FoxyMila", "18,420 XP"],
      ["🐼", "PandaRex", "16,991 XP"],
      ["🦁", "LeoPrime", "15,507 XP"],
      ["🐺", "WolfNora", "14,112 XP"],
      ["🐨", "KoalaJay", "13,880 XP"],
    ];

    const state = {
      tab: "play",
      tierId: "all25",
      demo: true,
      sparks: 0,
      gifts: ["🌹","🧸","🎁"], // Default fallback
      winner: null,
      spinning: false,
      userName: "Guest",
      region: "regional",
    };

    function currentTier() { return tiers.find(t => t.id === state.tierId) || tiers[0]; }
    function currentPool() { return currentTier().cost >= 50 ? pool50 : pool25; }

    function weightedPick(pool) {
      const total = pool.reduce((a, i) => a + i.probability, 0);
      let r = Math.random() * total;
      for (const item of pool) { r -= item.probability; if (r <= 0) return item; }
      return pool[pool.length - 1];
    }

    function render() {
      const app = document.getElementById("app");
      const tier = currentTier();
      const pool = currentPool();
      app.innerHTML = `
        <header class="sticky top-0 z-20 flex items-center justify-between border-b border-white/10 bg-slate-950/75 px-4 py-4 backdrop-blur-xl">
          <button class="rounded-full p-2 hover:bg-white/10"><i class="fa-solid fa-xmark"></i></button>
          <h1 class="text-lg font-semibold tracking-tight">Random Gift</h1>
          <button class="rounded-full p-2 hover:bg-white/10"><i class="fa-solid fa-ellipsis"></i></button>
        </header>
        <main class="px-4 pt-4 space-y-4 ${state.tab !== "play" ? "pb-4" : ""}">
          ${state.tab === "top" ? topTab() : ""}
          ${state.tab === "play" ? playTab(tier, pool) : ""}
          ${state.tab === "lotteries" ? lotteriesTab() : ""}
          ${state.tab === "profile" ? profileTab() : ""}
        </main>
        <nav class="fixed bottom-0 left-0 right-0 border-t border-white/10 bg-slate-950/85 px-2 py-2 backdrop-blur-2xl">
          <div class="mx-auto grid max-w-md grid-cols-4 gap-1 text-xs">
            ${bottomItem("top", "🌐", "Top")}
            ${bottomItem("play", "🎲", "Play")}
            ${bottomItem("lotteries", "🎟️", "Lotteries")}
            ${bottomItem("profile", "👤", "Profile")}
          </div>
        </nav>
      `;
      bindEvents();
    }

    function topTab() {
      return `
        <section class="space-y-4">
          <div class="glass rounded-3xl p-5">
            <div class="text-5xl mb-3">🏆</div>
            <h2 class="text-xl font-semibold">Leaderboard</h2>
            <div class="mt-4 grid grid-cols-2 gap-2 rounded-2xl bg-white/5 p-1">
              <button data-region="regional" class="region-btn rounded-xl px-3 py-2 ${state.region === "regional" ? "bg-blue-500 text-white" : "text-slate-300"}">Regional</button>
              <button data-region="worldwide" class="region-btn rounded-xl px-3 py-2 ${state.region === "worldwide" ? "bg-blue-500 text-white" : "text-slate-300"}">Worldwide</button>
            </div>
          </div>
          <div class="glass rounded-3xl p-3 space-y-2">
            ${leaderboard.map((u, i) => `
              <div class="flex items-center justify-between rounded-2xl bg-white/5 px-3 py-2.5">
                <div class="flex items-center gap-3"><div class="h-10 w-10 rounded-full bg-white/10 grid place-items-center text-lg">${u[0]}</div><div><p class="text-sm font-medium">${i+1}. ${u[1]}</p><p class="text-xs text-slate-300">${u[2]}</p></div></div>
                <span class="text-xs text-yellow-400">+${Math.max(40-i*7, 12)}✨</span>
              </div>
            `).join("")}
          </div>
        </section>
      `;
    }

    function playTab(tier, pool) {
      const priceText = state.demo ? "FREE" : `Pay ✨ ${tier.cost}`;
      return `
        <section class="space-y-4">
          <div class="glass rounded-3xl p-3">
            <div class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
              ${tiers.map(t => `<button data-tier="${t.id}" class="tier-btn shrink-0 rounded-2xl px-3 py-2 text-sm ${state.tierId===t.id?"bg-blue-500 text-white shadow-[0_0_22px_rgba(59,130,246,.45)]":"bg-white/5 text-slate-300"}">${t.label}</button>`).join("")}
            </div>
          </div>
          <div class="flex gap-3 overflow-x-auto no-scrollbar pb-1">
            ${tier.preview.map(g => `<div class="glass h-28 w-24 shrink-0 rounded-3xl grid place-items-center text-4xl">${g}</div>`).join("")}
          </div>
          <div class="glass rounded-3xl p-4">
            <div class="mb-3 flex items-center justify-between rounded-2xl bg-white/5 px-3 py-2.5">
              <span class="text-sm font-medium">Demo mode</span>
              <button id="demoToggle" class="h-6 w-11 rounded-full p-0.5 transition ${state.demo?"bg-blue-500":"bg-slate-600"}"><span class="block h-5 w-5 rounded-full bg-white transition ${state.demo?"translate-x-5":"translate-x-0"}"></span></button>
            </div>
            <button id="spinBtn" class="btn-glow relative h-14 w-full rounded-2xl bg-blue-500 text-base font-semibold text-white hover:brightness-110">
              I'll be lucky!
              <span class="absolute right-3 top-1/2 -translate-y-1/2 rounded-full bg-yellow-400 px-2.5 py-1 text-xs font-bold text-slate-900">${priceText}</span>
            </button>
          </div>
          <div class="glass rounded-3xl p-4">
            <div class="mb-3 flex items-center justify-between"><p class="text-sm font-medium">You may win...</p></div>
            <div class="grid grid-cols-2 gap-2">
              ${pool.map(p => `<div class="rounded-2xl bg-white/5 px-3 py-3"><p class="text-xs text-slate-300">${p.probability}%</p><p class="mt-1 text-base font-semibold">${p.emoji} ${p.reward}</p></div>`).join("")}
            </div>
          </div>
        </section>
      `;
    }

    function lotteriesTab() {
      return `<section class="space-y-4"><div class="glass rounded-3xl p-5"><div class="text-3xl mb-4">🎟️</div><h2 class="text-xl font-semibold">Active Lotteries</h2><p class="text-slate-300">Lotteries created by owner will appear here</p></div></section>`;
    }

    function profileTab() {
      return `
        <section class="space-y-4">
          <div class="glass rounded-3xl p-5">
            <div class="mx-auto mb-3 grid h-20 w-20 place-items-center rounded-full bg-white/10 text-3xl">👤</div>
            <h2 class="text-center text-xl font-semibold">${state.userName}</h2>
            <div class="mt-4 rounded-2xl bg-white/5 px-4 py-3 text-center"><p class="text-xs text-slate-300">Sparks balance</p><p class="mt-1 text-xl font-semibold text-yellow-400">✨ ${state.sparks}</p></div>
          </div>
          <div class="glass rounded-3xl p-4"><h3 class="mb-3 text-sm font-medium">Owned gifts</h3><div class="grid grid-cols-4 gap-2">${state.gifts.map(g => `<div class="grid h-16 place-items-center rounded-2xl bg-white/5 text-2xl">${g}</div>`).join("")}</div></div>
        </section>
      `;
    }

    function bottomItem(key, icon, label) {
      const active = state.tab === key;
      return `<button data-tab="${key}" class="tab-btn rounded-2xl px-2 py-2 ${active ? "bg-blue-500/20 text-blue-400" : "text-slate-300 hover:bg-white/5"}"><div class="text-base">${icon}</div><div class="mt-1">${label}</div></button>`;
    }

    function bindEvents() {
      document.querySelectorAll(".tab-btn, .tier-btn, .region-btn").forEach(el => {
        el.addEventListener("click", () => {
          if (el.dataset.tab) state.tab = el.dataset.tab;
          if (el.dataset.tier) state.tierId = el.dataset.tier;
          if (el.dataset.region) state.region = el.dataset.region;
          render();
        });
      });
      document.getElementById("demoToggle")?.addEventListener("click", () => { state.demo = !state.demo; render(); });
      document.getElementById("spinBtn")?.addEventListener("click", spin);
    }

    async function spin() {
      if (state.spinning) return;
      const tier = currentTier();
      const tg = window.Telegram?.WebApp;
      state.spinning = true;
      let winner;

      if (state.demo) {
        winner = weightedPick(currentPool());
      } else {
        if (!tg || !tg.initData) {
          alert("Open inside Telegram to play for real!");
          state.spinning = false;
          return;
        }
        // Add real payment and API logic here as needed
        winner = weightedPick(currentPool()); // Fallback for now if no backend
      }

      await executeSpinAnimation(currentPool(), winner);
    }

    async function executeSpinAnimation(pool, winner) {
      showSpinOverlay(pool, winner);
      const track = document.getElementById("reelTrack");
      const container = track.parentElement;
      
      const step = 92; 
      const stopIndex = 62; 
      
      const containerCenter = container.offsetWidth / 2;
      const targetItemCenter = (stopIndex * step) + (80 / 2); 
      const finalTranslateX = containerCenter - targetItemCenter;

      track.style.transition = "none";
      track.style.transform = "translateX(0px)";
      await wait(60);

      track.style.transition = "transform 520ms cubic-bezier(0.22, 0.88, 0.38, 1)";
      track.style.transform = `translateX(${-14 * step}px)`;
      await wait(520);

      track.style.transition = "transform 2100ms linear";
      track.style.transform = `translateX(${-44 * step}px)`;
      await wait(2100);

      track.style.transition = "transform 2800ms cubic-bezier(0.08, 0.86, 0.22, 1.03)";
      track.style.transform = `translateX(${finalTranslateX}px)`;
      await wait(2800);

      hideSpinOverlay();
      showWinOverlay(winner);
      state.spinning = false;
    }

    function showSpinOverlay(pool, winner) {
      const overlay = document.createElement("div");
      overlay.id = "spinOverlay";
      overlay.className = "fixed inset-0 z-40 grid place-items-center bg-slate-950/95 px-4";
      overlay.innerHTML = `
        <div class="glass w-full max-w-sm rounded-3xl p-4">
          <div class="relative overflow-hidden rounded-2xl border border-white/10 bg-white/5 py-5 w-full">
            <div class="absolute left-1/2 top-0 z-10 h-full -translate-x-1/2 px-1"><div class="pointer-glow h-6 w-3 rounded-b-full bg-blue-500"></div></div>
            <div id="reelTrack" class="flex gap-3 px-0 w-max"></div>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);

      const reelTrack = document.getElementById("reelTrack");
      const reel = Array.from({ length: 72 }, (_, i) => pool[i % pool.length]);
      reel[62] = winner; 
      reelTrack.innerHTML = reel.map(r => `<div class="grid h-24 w-20 shrink-0 place-items-center rounded-2xl border border-white/10 bg-white/10 text-4xl">${r.emoji}</div>`).join("");
    }

    function hideSpinOverlay() { document.getElementById("spinOverlay")?.remove(); }

    function showWinOverlay(winner) {
      const overlay = document.createElement("div");
      overlay.id = "winOverlay";
      overlay.className = "fixed inset-0 z-50 grid place-items-center bg-slate-950/95 px-4";
      overlay.innerHTML = `
        <div class="glass win-glow w-full max-w-sm rounded-3xl p-5 text-center">
          <div class="bounce-gift mx-auto mb-4 grid h-28 w-28 place-items-center rounded-full bg-white/10 text-6xl">${winner.emoji}</div>
          <h2 class="text-xl font-semibold">You won!</h2>
          <div class="mt-5 space-y-2">
            <button id="closeWinBtn" class="h-11 w-full rounded-2xl bg-blue-500 font-semibold text-white">Awesome!</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      document.getElementById("closeWinBtn").onclick = () => { overlay.remove(); render(); };
    }

    function wait(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

    async function initializeApp() {
      const tg = window.Telegram?.WebApp;
      if (tg) {
        tg.ready(); tg.expand(); tg.setHeaderColor?.("#0f172a"); tg.setBackgroundColor?.("#0f172a");
        if (tg.initDataUnsafe?.user?.first_name) {
          state.userName = tg.initDataUnsafe.user.first_name;
        }
      }
      
      // Attempt to fetch from backend, but render anyway if it fails
      if (tg?.initData) {
        try {
          const res = await fetch(`${API_URL}/user`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ initData: tg.initData })
          });
          if (res.ok) {
            const data = await res.json();
            state.sparks = data.sparks;
            state.gifts = data.gifts;
          }
        } catch (err) {
          console.warn("Backend not connected yet. Using local state.");
        }
      }
      render();
    }

    initializeApp();
  </script>
</body>
</html>
